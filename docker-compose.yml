services:
  postgres:
    image: postgres:16-alpine
    container_name: nbe8-team01-postgres
    restart: unless-stopped
    environment:
      # Spring dev 프로필과 로더 스크립트 기본값을 이 값과 맞춘다.
      POSTGRES_DB: ${DB_NAME:-back}
      POSTGRES_USER: ${DB_USERNAME:-back}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-back1234}
      TZ: Asia/Seoul
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-back} -d ${DB_NAME:-back}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
