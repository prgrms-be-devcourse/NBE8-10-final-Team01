services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      # Spring dev 프로필과 로더 스크립트 기본값을 이 값과 맞춘다.
      POSTGRES_DB: ${DB_NAME:-back}
      POSTGRES_USER: ${DB_USERNAME:-back}
      # 보안을 위해 기본 비밀번호는 두지 않고 환경변수 주입을 사용한다.
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # DB 최초 초기화 시 pgvector extension을 자동 생성한다.
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-back} -d ${DB_NAME:-back}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
