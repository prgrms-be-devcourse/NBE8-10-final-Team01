have_fun: false

memory_config:
  disabled: true

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: 8
  pull_request_opened:
    help: false
    summary: true
    code_review: true
  include_drafts: false

ignore_patterns:
  - "**/*.lock"
  - "**/build/**"
  - "**/dist/**"
  - "**/coverage/**"
  - "**/.gradle/**"
  - "**/*.png"
  - "**/*.jpg"
  - "**/*.jpeg"
  - "**/*.gif"
  - "**/*.svg"
  - "**/*.pdf"
