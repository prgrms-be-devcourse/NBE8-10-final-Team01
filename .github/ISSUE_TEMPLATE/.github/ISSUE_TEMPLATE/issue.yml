name: Issue
description: 작업 단위 이슈 (기능, 개선, 리팩토링 등)
title: "[TYPE] "
labels: []
assignees: []

body:
  - type: dropdown
    id: issue-type
    attributes:
      label: 이슈 유형
      description: 작업 유형을 선택해주세요.
      options:
        - feat
        - fix
        - refactor
        - docs
        - chore
        - test
    validations:
      required: true

  - type: textarea
    id: overview
    attributes:
      label: 개요
      description: 이슈에 대한 간단한 설명을 작성해주세요.
      placeholder: 예) 로그인 API 응답 구조 개선
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: 목표
      description: 이 이슈가 해결되면 무엇이 달성되는지 작성해주세요.
      placeholder: 예) 로그인 응답 형식을 프론트 요구사항에 맞게 통일
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 내용
      description: 수행할 작업을 체크리스트로 작성해주세요.
      value: |
        - [ ] 작업 1
        - [ ] 작업 2
        - [ ] 작업 3
    validations:
      required: true

  - type: textarea
    id: related
    attributes:
      label: 관련 이슈 / PR
      description: 관련된 이슈나 PR이 있다면 작성해주세요.
      placeholder: |
        관련 이슈: #
        관련 PR: #

  - type: textarea
    id: done
    attributes:
      label: 완료 조건 (Definition of Done)
      description: 완료 기준을 체크리스트로 작성해주세요.
      value: |
        - [ ] 요구사항 충족
        - [ ] 테스트 통과
        - [ ] 리뷰 반영 완료
    validations:
      required: true

  - type: textarea
    id: note
    attributes:
      label: 참고 사항
      description: 스크린샷, 링크, 문서 등을 작성해주세요.
