name: Issue
description: 작업 단위 이슈 (기능, 개선, 리팩토링 등)
title: "[type] "
labels: []
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        간단히 작성해주세요. 필수는 `개요`와 `작업 내용`만 입력하면 됩니다.

  - type: dropdown
    id: issue-type
    attributes:
      label: "🧩 이슈 유형"
      description: 가장 가까운 작업 유형을 선택해주세요.
      options:
        - feat
        - fix
        - refactor
        - docs
        - chore
        - test
    validations:
      required: true

  - type: textarea
    id: overview
    attributes:
      label: "📝 개요"
      description: 무엇을 왜 바꾸는지 한두 문장으로 작성해주세요.
      placeholder: 예) 이슈 템플릿 위치를 표준 경로로 이동
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "✅ 작업 내용"
      description: 필요한 작업만 체크리스트로 적어주세요.
      value: |
        - [ ] 작업 1
        - [ ] 작업 2
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "🎯 기대 결과 (선택)"
      description: 완료 후 기대하는 결과를 짧게 작성해주세요.
      placeholder: 예) 이슈 생성 화면에서 템플릿이 정상 노출됨

  - type: textarea
    id: references
    attributes:
      label: "🔗 참고 링크 / 메모 (선택)"
      description: PR, 문서, 스크린샷 링크가 있으면 남겨주세요.
