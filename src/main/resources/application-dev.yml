spring:
  datasource:
    # 팀 로컬 기본값은 docker-compose.yml과 동일하게 유지한다.
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME}?reWriteBatchedInserts=true
    username: ${DB_USERNAME}
    # 비밀번호는 .env/IDE 환경변수에서 주입한다.
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 100

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

judge0:
  url: http://${JUDGE0_EC2_IP}:2358

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      # p95/p99 쿼리를 위해 HTTP 서버 요청 히스토그램을 활성화한다.
      percentiles:
        http:
          server:
            requests: 0.5, 0.9, 0.95, 0.99
      # SLO 구간을 고정해 시계열 변동 없이 패널을 구성할 수 있게 한다.
      slo:
        http:
          server:
            requests: 50ms, 100ms, 200ms, 500ms, 1s, 2s
      percentiles-histogram:
        http:
          server:
            requests: true

matching:
  store:
    type: redis
